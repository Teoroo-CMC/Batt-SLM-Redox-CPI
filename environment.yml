name: gsds
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.10.8
  - pytorch=2.3.0
  - pytorch-cuda=11.8
  - torchvision
  - torchaudio
  - pip

  # core numerics
  - numpy=1.23.5
  - scipy=1.15.1
  - pandas=2.2.3

  # cheminformatics
  - rdkit=2024.9.4
  - scikit-learn=1.6.1

  # plotting / utils
  - matplotlib=3.10.0
  - umap-learn=0.5.7

  # other packages
  - packaging=25.0
  - pyyaml=6.0.2
  - click=7.1.1
  - glob2
  - h5py=3.12.1
  - tqdm=4.67.1

  # pip packages
  - pip:
      - ase==3.25.0
      - e3nn==0.4.4
      - protobuf==3.9.2
      - joblib==1.5.2
      - xgboost==3.1.3
      - imbalanced-learn==0.12.4
      - adjustText==1.3.0
      - tensorflow==2.9.0
      - tensorboard
      - mace-torch==0.3.13
